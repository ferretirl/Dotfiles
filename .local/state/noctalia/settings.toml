    [wallpaper.monitors.DP-1]
    path = "/home/ferret/Pictures/bg/007cYGsBgy1i8my55lvk2j323m0u0duh (1)_upscayl_2x_high-fidelity-4x.png"

    [wallpaper.monitors.DP-2]
    path = "/home/ferret/Pictures/bg/007cYGsBgy1i8my55lvk2j323m0u0duh (1)_upscayl_2x_high-fidelity-4x.png"

[weather]
address = "Uhersky Brod, Czech Republic"

[widget.clock]
