[bar]
order = [ "uwu" ]

    [bar.uwu]
    background_opacity = 0.9499999787658453
    border = "surface"
    end = [ "tray", "notifications", "media" ]
    font_weight = 400
    margin_edge = 10.0
    margin_ends = 100.0
    padding = 15
    radius = 20
    scale = 1.350000012665987
    start = [ "workspaces" ]
    thickness = 40

[desktop_widgets]
enabled = false

[keybinds]
down = [ "Ctrl+j" ]
left = [ "Ctrl+h" ]
right = [ "Ctrl+l" ]
up = [ "Ctrl+k" ]

[notification]
offset_x = 10.0
offset_y = 10.0
scale = 0.7500000037252903

[osd]
scale = 0.7500000037252903

[shell]
avatar_path = "/home/ferret/Pictures/hina/c4fe544f8dc197413f335e727d561962.webp"
clipboard_auto_paste = "off"
clipboard_history_max_entries = 100.0
corner_radius_scale = 0.5000000074505806
date_format = "{:%A}, {:/%d/%m/%Y}"
font_family = "Agave Nerd Font Mono"
lang = "en"
polkit_agent = true
settings_show_advanced = false
show_location = false
ui_scale = 1.2000000104308128

    [shell.panel]
    launcher_categories = false
    launcher_placement = "attached"

[theme]
builtin = "Rosé Pine"
community_palette = "Monochrome"
custom_palette = "monochrome"
source = "custom"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "gtk3", "gtk4", "ghostty", "hyprland", "qt", "starship" ]
    community_ids = [ "yazi", "discord" ]

[wallpaper]
directory = "/home/ferret/Pictures/bg"
transition = [ "fade" ]

    [wallpaper.default]
    path = "/home/ferret/Pictures/bg/007cYGsBgy1i8my55lvk2j323m0u0duh (1)_upscayl_2x_high-fidelity-4x.png"

    [wallpaper.last]
